default_install_hook_types: [pre-commit, post-merge]
exclude: 'static/'

repos:
- repo: local
  hooks:
  - id: uv-lock-check
    name: uv lock --check
    entry: uv lock --check
    language: system
    pass_filenames: false
    files: ^(pyproject\.toml|uv\.lock)$

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: end-of-file-fixer
  - id: trailing-whitespace

- repo: local
  hooks:
  - id: ruff-check
    name: ruff check
    entry: uv run ruff check
    language: system
    types_or: [python, pyi]
    pass_filenames: false
    always_run: true
  - id: ruff-format
    name: ruff format
    entry: uv run ruff format --check
    language: system
    types_or: [python, pyi]
    pass_filenames: false
    always_run: true
  - id: codespell
    name: codespell
    entry: uv run codespell
    language: system
    types_or: [python, markdown, yaml]
    pass_filenames: false
    always_run: true
  - id: ty-check
    name: ty check
    entry: uv run ty check
    language: system
    pass_filenames: false
    always_run: true
  - id: bandit
    name: bandit
    entry: uv run bandit -r . -c pyproject.toml -q
    language: system
    pass_filenames: false
    always_run: true
