<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generated</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
          integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2"
          crossorigin="anonymous">
</head>
<body>
    <div class="container">
    <div class="row justify-content-center">
    <div class="col-lg-6">

    <h1>QR Code Generated</h1>
    <img src="{{ url_for('download', id=token) }}" alt="QR Code"><br>
    <a href="{{ url_for('download', id=token) }}" download>Download QR Code without Image</a><br>

    {% if qr_with_image_exists %}
    <img src="{{ url_for('download_with_image', id=token) }}" alt="QR Code with background"><br>
    <a href="{{ url_for('download_with_image', id=token) }}" download>Download QR Code with Image</a><br>
    {% endif %}

    <br>
    <a href="/">Back to previous page</a>

    </div>
    </div>
    </div>

</body>
</html>
