<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generated</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>
<body>
    <div class="container">
    <div class="row justify-content-center">
    <div class="col-lg-6">

    <h1 class="my-4">QR Code Generated</h1>
    <img src="{{ url_for('download', id=token) }}" alt="QR Code" class="img-fluid d-block mb-2">
    <a href="{{ url_for('download', id=token) }}" download class="btn btn-primary mb-4 d-inline-block">Download QR Code without Image</a>

    {% if qr_with_image_exists %}
    <img src="{{ url_for('download_with_image', id=token) }}" alt="QR Code with background" class="img-fluid d-block mb-2">
    <a href="{{ url_for('download_with_image', id=token) }}" download class="btn btn-primary mb-4 d-inline-block">Download QR Code with Image</a>
    {% endif %}

    <a href="/" class="btn btn-outline-secondary d-block">Back to previous page</a>

    </div>
    </div>
    </div>

</body>
</html>
