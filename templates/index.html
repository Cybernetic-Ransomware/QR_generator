<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>

<body>
    <div class="container">
    <div class="row justify-content-center">
    <div class="col-lg-6">

    <h1 class="my-4">QR Code Generator</h1>
    <form id='generate-form' action="/generate" method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
            <label for="text" class="form-label">Text:</label>
            <input type="text" id="text" name="text" class="form-control">
        </div>

        <div class="mb-3">
            <label for="size" class="form-label">Size:</label>
            <input type="range" id="size" name="size" min="1" max="30" value="15" class="form-range">
        </div>

        <div class="mb-3">
            <label for="image" class="form-label">Image:</label>
            <input type="file" id="image" name="image" class="form-control">
            <input type="button" class="btn btn-secondary btn-sm mt-2" value="Remove file" onclick="clearFileInput()">
        </div>

        <div class="mb-3">
            <label for="color" class="form-label">Color (RGB):</label>
            <input type="color" id="color" name="color" class="form-control form-control-color">
        </div>

        <div class="mb-3 form-check form-switch">
            <input class="form-check-input" type="checkbox" id="micro" name="micro">
            <label class="form-check-label" for="micro">Micro QR code</label>
        </div>

        <input type="submit" class="btn btn-primary" value="Generate">
    </form>


    <!-- Modal -->
    <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="errorModalLabel">Error</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="errorModalBody">
            No errors
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script src="{{ url_for('static', filename='js/input_errors_modal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/form_remove_image.js') }}"></script>

    </div>
    </div>
    </div>
</body>
</html>
