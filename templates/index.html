<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>

<body>
    <div class="container">
    <div class="row justify-content-center">
    <div class="col-lg-6">

    <h1>QR Code Generator</h1>
    <form id='generate-form' action="/generate" method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="text">Text:</label><br>
        <input type="text" id="text" name="text"><br>

        <label for="size">Size:</label><br>
        <input type="range" id="size" name="size" min="1" max="30" value="15"><br>

        <label for="image">Image:</label><br>
        <input type="file" id="image" name="image"><br>
        <input type="button" value="Remove file" onclick="clearFileInput()"><br>

        <label for="color">Color (RGB):</label><br>
        <input type="color" id="color" name="color"><br>
        <input type="submit" value="Generate">
    </form>


    <!-- Modal -->
    <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="errorModalLabel">Error</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="errorModalBody">
            No errors
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script src="{{ url_for('static', filename='js/input_errors_modal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/form_remove_image.js') }}"></script>

    </div>
    </div>
    </div>
</body>
</html>
